name: CI/CD Pipeline - Voting App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}

jobs:
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build and Push Vote Image
      uses: docker/build-push-action@v4
      with:
        context: ./vote
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/vote:latest
          ${{ secrets.DOCKER_USERNAME }}/vote:${{ github.sha }}

    - name: Build and Push Result Image
      uses: docker/build-push-action@v4
      with:
        context: ./result
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/result:latest
          ${{ secrets.DOCKER_USERNAME }}/result:${{ github.sha }}

    - name: Build and Push Worker Image
      uses: docker/build-push-action@v4
      with:
        context: ./worker
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/worker:latest
          ${{ secrets.DOCKER_USERNAME }}/worker:${{ github.sha }}

  verify:
    name: Verify Images
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
    - name: Pull and Verify Vote Image
      run: docker pull ${{ secrets.DOCKER_USERNAME }}/vote:latest

    - name: Pull and Verify Result Image
      run: docker pull ${{ secrets.DOCKER_USERNAME }}/result:latest

    - name: Pull and Verify Worker Image
      run: docker pull ${{ secrets.DOCKER_USERNAME }}/worker:latest

    - name: Print Success
      run: |
        echo "✅ All images built and pushed successfully"
        echo "Vote: ${{ secrets.DOCKER_USERNAME }}/vote:latest"
        echo "Result: ${{ secrets.DOCKER_USERNAME }}/result:latest"
        echo "Worker: ${{ secrets.DOCKER_USERNAME }}/worker:latest"